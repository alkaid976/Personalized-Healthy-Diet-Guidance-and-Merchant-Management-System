
<!DOCTYPE html>
<html>
<head>
    <title>用户注册 - NutriAdvisor</title>
    <!-- 共用样式 -->
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f6fa;
        }
       .container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
       .form-group {
            margin-bottom: 15px;
        }
       .form-group label {
            display: block;
            margin-bottom: 5px;
        }
       .form-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background: #2ed573;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #7bed9f;
        }
       .error-card {
            background: #ff6b81;
            color: white;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
        }
       .auth-links {
            margin-top: 15px;
        }
       .auth-links a {
            color: #007bff;
            text-decoration: none;
        }
       .auth-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📝 用户注册</h2>
        {% if error %}
        <div class="error-card">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit">立即注册</button>
        </form>
        <div class="auth-links">
            <a href="{{ url_for('combined_login') }}">已有账号登录</a>
        </div>
    </div>
</body>
</html>
